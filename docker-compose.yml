services:
  bot-service:
    build:
      context: ./services/bot-service
    container_name: customs-bot-service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/1
      - CORE_API_URL=http://core-api:8001
      - FILE_SERVICE_URL=http://file-service:8002
      - AI_SERVICE_URL=http://ai-service:8003
    depends_on:
      redis:
        condition: service_healthy
      core-api:
        condition: service_started

  postgres:
    image: postgres:15
    container_name: customs-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infrastructure/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    env_file:
      - .env

  redis:
    image: redis:7
    container_name: customs-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: customs-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    env_file:
      - .env

  core-api:
    build:
      context: .
      dockerfile: services/core-api/Dockerfile
    container_name: customs-core-api
    ports:
      - "8001:8001"
    volumes:
      - ./services/core-api/app:/app/app
      - ./services/core-api/alembic:/app/alembic
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: ${JWT_ALGORITHM}
      JWT_EXPIRATION_MINUTES: ${JWT_EXPIRATION_MINUTES}
      LOG_LEVEL: ${LOG_LEVEL}
      AI_SERVICE_URL: http://ai-service:8003
      EEC_PORTAL_BASE_URL: ${EEC_PORTAL_BASE_URL:-https://portal.eaeunion.org/sites/odata/_api/web/lists}
      EEC_SYNC_ENABLED: ${EEC_SYNC_ENABLED:-true}
      EEC_SYNC_INTERVAL_HOURS: ${EEC_SYNC_INTERVAL_HOURS:-24}
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  file-service:
    build:
      context: .
      dockerfile: services/file-service/Dockerfile
    container_name: customs-file-service
    ports:
      - "8002:8002"
    volumes:
      - ./services/file-service/app:/app/app
    depends_on:
      minio:
        condition: service_healthy
      gotenberg:
        condition: service_healthy
    environment:
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET}
      MINIO_SECURE: "false"
      GOTENBERG_URL: http://gotenberg:3000
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  ai-service:
    build:
      context: .
      dockerfile: services/ai-service/Dockerfile
    container_name: customs-ai-service
    ports:
      - "8003:8003"
    volumes:
      - ./services/ai-service/app:/app/app
      - ./docs:/app/docs:ro
    depends_on:
      core-api:
        condition: service_healthy
      calc-service:
        condition: service_healthy
      chromadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      CORE_API_URL: http://core-api:8001
      CALC_SERVICE_URL: http://calc-service:8005
      # LLM Provider (DeepSeek default, OpenAI/Cloud.ru as alternatives)
      LLM_PROVIDER: ${LLM_PROVIDER:-deepseek}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.deepseek.com}
      LLM_API_KEY: ${LLM_API_KEY:-${OPENAI_API_KEY}}
      LLM_MODEL: ${LLM_MODEL:-deepseek-chat}
      LLM_REASONING_MODEL: ${LLM_REASONING_MODEL:-deepseek-reasoner}
      LLM_PROJECT_ID: ${LLM_PROJECT_ID:-}
      EMBED_PROVIDER: ${EMBED_PROVIDER:-local}
      # Vision OCR (DeepSeek-OCR-2 via Cloud.ru)
      OCR_ENABLED: ${OCR_ENABLED:-false}
      OCR_BASE_URL: ${OCR_BASE_URL:-https://foundation-models.api.cloud.ru/v1}
      OCR_API_KEY: ${OCR_API_KEY:-}
      OCR_MODEL: ${OCR_MODEL:-deepseek-ai/DeepSeek-OCR-2}
      OCR_PROJECT_ID: ${OCR_PROJECT_ID:-}
      OCR_TIMEOUT: ${OCR_TIMEOUT:-60}
      # Legacy OpenAI (backward compat)
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL}
      CHROMADB_HOST: chromadb
      CHROMADB_PORT: 8000
      PHOENIX_HOST: phoenix
      PHOENIX_PORT: 6006
      REDIS_BROKER_URL: redis://redis:6379/2
      TASK_QUEUE_ENABLED: ${TASK_QUEUE_ENABLED:-true}
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  calc-service:
    build:
      context: .
      dockerfile: services/calc-service/Dockerfile
    container_name: customs-calc-service
    ports:
      - "8005:8005"
    volumes:
      - ./services/calc-service/app:/app/app
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_URL: redis://redis:6379/0
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8005/ready"]
      interval: 30s
      timeout: 10s
      retries: 3

  integration-service:
    build:
      context: .
      dockerfile: services/integration-service/Dockerfile
    container_name: customs-integration
    ports:
      - "8004:8004"
    volumes:
      - ./services/integration-service/app:/app/app
    depends_on:
      core-api:
        condition: service_healthy
    environment:
      CORE_API_URL: http://core-api:8001
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/ready"]
      interval: 30s
      timeout: 10s
      retries: 3

  ai-worker:
    build:
      context: .
      dockerfile: services/ai-service/Dockerfile
    container_name: customs-ai-worker
    command: ["arq", "app.workers.tasks.WorkerSettings"]
    volumes:
      - ./services/ai-service/app:/app/app
      - ./docs:/app/docs:ro
    depends_on:
      redis:
        condition: service_healthy
      core-api:
        condition: service_healthy
      ai-service:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    environment:
      CORE_API_URL: http://core-api:8001
      CALC_SERVICE_URL: http://calc-service:8005
      LLM_PROVIDER: ${LLM_PROVIDER:-deepseek}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.deepseek.com}
      LLM_API_KEY: ${LLM_API_KEY:-${OPENAI_API_KEY}}
      LLM_MODEL: ${LLM_MODEL:-deepseek-chat}
      LLM_REASONING_MODEL: ${LLM_REASONING_MODEL:-deepseek-reasoner}
      LLM_PROJECT_ID: ${LLM_PROJECT_ID:-}
      EMBED_PROVIDER: ${EMBED_PROVIDER:-local}
      OCR_ENABLED: ${OCR_ENABLED:-false}
      OCR_BASE_URL: ${OCR_BASE_URL:-https://foundation-models.api.cloud.ru/v1}
      OCR_API_KEY: ${OCR_API_KEY:-}
      OCR_MODEL: ${OCR_MODEL:-deepseek-ai/DeepSeek-OCR-2}
      OCR_PROJECT_ID: ${OCR_PROJECT_ID:-}
      OCR_TIMEOUT: ${OCR_TIMEOUT:-60}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL}
      CHROMADB_HOST: chromadb
      CHROMADB_PORT: 8000
      REDIS_BROKER_URL: redis://redis:6379/2
      TASK_QUEUE_ENABLED: "true"
      ARQ_MAX_JOBS: "3"
      ARQ_JOB_TIMEOUT_SECONDS: "1800"
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import redis; r = redis.from_url('redis://redis:6379/2', socket_connect_timeout=3); r.ping()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  nginx:
    image: nginx:alpine
    container_name: customs-nginx
    ports:
      - "80:80"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - core-api
      - file-service
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: customs-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    depends_on:
      - core-api
      - file-service
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
      - WDS_SOCKET_PORT=3000
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  gotenberg:
    image: gotenberg/gotenberg:8
    container_name: customs-gotenberg
    command:
      - "gotenberg"
      - "--api-timeout=120s"
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  chromadb:
    image: chromadb/chroma:latest
    container_name: customs-chromadb
    ports:
      - "8100:8000"
    volumes:
      - chromadata:/chroma/chroma
    environment:
      - ANONYMIZED_TELEMETRY=false
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8000'"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  phoenix:
    image: arizephoenix/phoenix:latest
    container_name: customs-phoenix
    ports:
      - "6006:6006"
    volumes:
      - phoenixdata:/phoenix
    environment:
      - PHOENIX_PORT=6006

volumes:
  pgdata:
  miniodata:
  chromadata:
  phoenixdata:
