version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: customs-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infrastructure/postgres/init:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - customs-net
    env_file:
      - .env

  redis:
    image: redis:7
    container_name: customs-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - customs-net
    env_file:
      - .env

  minio:
    image: minio/minio:latest
    container_name: customs-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - miniodata:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - customs-net
    env_file:
      - .env

  core-api:
    build:
      context: .
      dockerfile: services/core-api/Dockerfile
    container_name: customs-core-api
    ports:
      - "${CORE_API_PORT}:8001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - customs-net
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  file-service:
    build:
      context: .
      dockerfile: services/file-service/Dockerfile
    container_name: customs-file-service
    ports:
      - "${FILE_SERVICE_PORT}:8002"
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - customs-net
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  ai-service:
    build:
      context: .
      dockerfile: services/ai-service/Dockerfile
    container_name: customs-ai-service
    ports:
      - "8003:8003"
    depends_on:
      - core-api
    networks:
      - customs-net
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:alpine
    container_name: customs-nginx
    ports:
      - "80:80"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - core-api
      - file-service
    networks:
      - customs-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: customs-frontend
    ports:
      - "3000:3000"
    networks:
      - customs-net
    depends_on:
      - core-api
      - file-service
    environment:
      - CHOKIDAR_USEPOLLING=true

volumes:
  pgdata:
  miniodata:

networks:
  customs-net:
    driver: bridge
