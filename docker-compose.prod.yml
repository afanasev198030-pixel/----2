# Production docker-compose — bridge network mode
# Запуск: docker compose -f docker-compose.prod.yml up --build -d
# Resource limits рассчитаны для сервера 32 GB RAM / 8 CPU

services:
  bot-service:
    build:
      context: ./services/bot-service
    container_name: customs-bot-service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/1
      - CORE_API_URL=http://core-api:8001
      - FILE_SERVICE_URL=http://file-service:8002
      - AI_SERVICE_URL=http://ai-service:8003
    depends_on:
      redis:
        condition: service_healthy
      core-api:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.50'
        reservations:
          memory: 128M
    networks:
      - customs-net

  postgres:
    image: postgres:15
    container_name: customs-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infrastructure/postgres/init:/docker-entrypoint-initdb.d
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.00'
        reservations:
          memory: 1G
    networks:
      - customs-net

  redis:
    image: redis:7
    container_name: customs-redis
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    expose:
      - "6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD} ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.50'
        reservations:
          memory: 128M
    networks:
      - customs-net

  minio:
    image: minio/minio:latest
    container_name: customs-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - miniodata:/data
    expose:
      - "9000"
      - "9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.00'
        reservations:
          memory: 256M
    networks:
      - customs-net

  gotenberg:
    image: gotenberg/gotenberg:8
    container_name: customs-gotenberg
    restart: unless-stopped
    command:
      - "gotenberg"
      - "--api-timeout=120s"
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.00'
        reservations:
          memory: 256M
    networks:
      - customs-net

  chromadb:
    image: chromadb/chroma:latest
    container_name: customs-chromadb
    restart: unless-stopped
    expose:
      - "8000"
    volumes:
      - chromadata:/chroma/chroma
    environment:
      - ANONYMIZED_TELEMETRY=false
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8000'"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.00'
        reservations:
          memory: 512M
    networks:
      - customs-net

  core-api:
    build:
      context: .
      dockerfile: services/core-api/Dockerfile
    container_name: customs-core-api
    restart: unless-stopped
    expose:
      - "8001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: HS256
      JWT_EXPIRATION_MINUTES: 60
      LOG_LEVEL: INFO
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '2.00'
        reservations:
          memory: 512M
    networks:
      - customs-net

  file-service:
    build:
      context: .
      dockerfile: services/file-service/Dockerfile
    container_name: customs-file-service
    restart: unless-stopped
    expose:
      - "8002"
    depends_on:
      minio:
        condition: service_healthy
      gotenberg:
        condition: service_healthy
    environment:
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: documents
      MINIO_SECURE: "false"
      GOTENBERG_URL: http://gotenberg:3000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.00'
        reservations:
          memory: 128M
    networks:
      - customs-net

  ai-service:
    build:
      context: .
      dockerfile: services/ai-service/Dockerfile
    container_name: customs-ai-service
    restart: unless-stopped
    expose:
      - "8003"
    depends_on:
      core-api:
        condition: service_healthy
      chromadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      CORE_API_URL: http://core-api:8001
      CALC_SERVICE_URL: http://calc-service:8005
      LLM_PROVIDER: ${LLM_PROVIDER:-deepseek}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.deepseek.com}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-deepseek-chat}
      LLM_REASONING_MODEL: ${LLM_REASONING_MODEL:-deepseek-reasoner}
      LLM_PROJECT_ID: ${LLM_PROJECT_ID:-}
      EMBED_PROVIDER: ${EMBED_PROVIDER:-local}
      EMBED_MODEL: ${EMBED_MODEL:-BAAI/bge-m3}
      EMBED_BASE_URL: ${EMBED_BASE_URL:-}
      EMBED_API_KEY: ${EMBED_API_KEY:-}
      OCR_ENABLED: ${OCR_ENABLED:-false}
      OCR_BASE_URL: ${OCR_BASE_URL:-https://foundation-models.api.cloud.ru/v1}
      OCR_API_KEY: ${OCR_API_KEY:-}
      OCR_MODEL: ${OCR_MODEL:-deepseek-ai/DeepSeek-OCR-2}
      OCR_PROJECT_ID: ${OCR_PROJECT_ID:-}
      OCR_TIMEOUT: ${OCR_TIMEOUT:-60}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o}
      CHROMADB_HOST: chromadb
      CHROMADB_PORT: 8000
      REDIS_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/2
      SERVICE_NAME: ai-service
      LOG_LEVEL: INFO
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.00'
        reservations:
          memory: 512M
    networks:
      - customs-net

  ai-worker:
    build:
      context: .
      dockerfile: services/ai-service/Dockerfile
    container_name: customs-ai-worker
    command: ["arq", "app.workers.tasks.WorkerSettings"]
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      core-api:
        condition: service_healthy
      ai-service:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    environment:
      CORE_API_URL: http://core-api:8001
      CALC_SERVICE_URL: http://calc-service:8005
      LLM_PROVIDER: ${LLM_PROVIDER:-deepseek}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.deepseek.com}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-deepseek-chat}
      LLM_REASONING_MODEL: ${LLM_REASONING_MODEL:-deepseek-reasoner}
      LLM_PROJECT_ID: ${LLM_PROJECT_ID:-}
      EMBED_PROVIDER: ${EMBED_PROVIDER:-local}
      EMBED_MODEL: ${EMBED_MODEL:-BAAI/bge-m3}
      EMBED_BASE_URL: ${EMBED_BASE_URL:-}
      EMBED_API_KEY: ${EMBED_API_KEY:-}
      OCR_ENABLED: ${OCR_ENABLED:-false}
      OCR_BASE_URL: ${OCR_BASE_URL:-https://foundation-models.api.cloud.ru/v1}
      OCR_API_KEY: ${OCR_API_KEY:-}
      OCR_MODEL: ${OCR_MODEL:-deepseek-ai/DeepSeek-OCR-2}
      OCR_PROJECT_ID: ${OCR_PROJECT_ID:-}
      OCR_TIMEOUT: ${OCR_TIMEOUT:-60}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o}
      CHROMADB_HOST: chromadb
      CHROMADB_PORT: 8000
      REDIS_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/2
      TASK_QUEUE_ENABLED: "true"
      ARQ_MAX_JOBS: "3"
      ARQ_JOB_TIMEOUT_SECONDS: "1800"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import os,redis; r = redis.from_url(os.environ.get('REDIS_BROKER_URL','redis://redis:6379/2'), socket_connect_timeout=3); r.ping()\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '4.00'
        reservations:
          memory: 1G
    networks:
      - customs-net

  calc-service:
    build:
      context: .
      dockerfile: services/calc-service/Dockerfile
    container_name: customs-calc-service
    restart: unless-stopped
    expose:
      - "8005"
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      SERVICE_NAME: calc-service
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8005/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.50'
        reservations:
          memory: 128M
    networks:
      - customs-net

  integration-service:
    build:
      context: .
      dockerfile: services/integration-service/Dockerfile
    container_name: customs-integration-service
    restart: unless-stopped
    expose:
      - "8004"
    depends_on:
      core-api:
        condition: service_healthy
    environment:
      CORE_API_URL: http://core-api:8001
      SERVICE_NAME: integration-service
      LOG_LEVEL: INFO
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.50'
        reservations:
          memory: 128M
    networks:
      - customs-net

  nginx:
    image: nginx:alpine
    container_name: customs-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - core-api
      - file-service
      - ai-service
      - integration-service
      - calc-service
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.50'
        reservations:
          memory: 64M
    networks:
      - customs-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: customs-frontend
    restart: unless-stopped
    expose:
      - "3000"
    depends_on:
      - nginx
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.50'
        reservations:
          memory: 64M
    networks:
      - customs-net

volumes:
  pgdata:
  miniodata:
  chromadata:

networks:
  customs-net:
    driver: bridge
