server {
    listen 3000;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    location /api/v1/ai/ {
        proxy_pass http://ai-service:8003;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Request-ID $request_id;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        client_max_body_size 50M;
    }

    location /api/v1/files/ {
        proxy_pass http://file-service:8002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Request-ID $request_id;
        proxy_read_timeout 120s;
        client_max_body_size 50M;
    }

    location /api/v1/calc/ {
        proxy_pass http://calc-service:8005;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Request-ID $request_id;
        proxy_read_timeout 120s;
        client_max_body_size 50M;
    }

    location /api/v1/integration/ {
        proxy_pass http://integration-service:8004;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Request-ID $request_id;
        proxy_read_timeout 120s;
        client_max_body_size 50M;
    }

    location /api/ {
        proxy_pass http://core-api:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Request-ID $request_id;
        proxy_read_timeout 120s;
        client_max_body_size 50M;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
