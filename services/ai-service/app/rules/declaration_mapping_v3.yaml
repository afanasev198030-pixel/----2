  - id: origin_requires_evidence
    description: "Графа 16/34 без сертификата/подтверждения → confidence cap 0.6 + flag 'неподтверждено'; значение показывать, не скрывать"
  - id: hs_requires_confirmation
    description: "Графа 33 без решения ФТС → mark as candidate + require user confirm"
  - id: weights_consistency
