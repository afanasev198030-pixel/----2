        - pattern: "\\d{3} \\d{5}"
          description: "код органа через РБ/КЗ: ZZZ XXXXX (3-значный код государства + 5-значный код органа)"
      multiple_allowed: true
      note: "если ввоз через несколько пунктов — перечислить все коды"
      skip_for: [pipeline, electric]
    ai_rule: "определить место прибытия из транспортных документов; сопоставить с классификатором таможенных органов для получения кода"

  - graph: 30
    name: "Местонахождение товаров"
    note: "Место нахождения товара на момент подачи ДТ. Определяется из транспортных документов. Если не найдено — подсветить пользователю (warning)."
    target:
      kind: core_declaration
      field: goods_location
    sources: [transport_doc]
    source_notes:
      transport_doc: "AWB / CMR / B/L — поле «Place of Delivery» / «Место доставки»."
    ai_rule: |
      Извлечь место нахождения товара из транспортных документов (поле Place of Delivery / место доставки).
      Если информация не найдена — оставить пустым и подсветить поле пользователю
      с сообщением: «Укажите место нахождения товаров». Severity: warning.
    confidence:
