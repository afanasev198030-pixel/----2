      min: 0

  - graph: 24
    name: "Характер сделки"
    classifiers:
      - "Классификатор характера сделки (подраздел 1)"
      - "Классификатор особенности сделки (подраздел 2)"
    note: |
      Три подраздела:
        Подраздел 1: трёхзначный код характера сделки (по Классификатору характера сделки).
        Подраздел 2: двузначный код особенности сделки (по Классификатору особенности сделки).
        Подраздел 3: не заполняется.
    target:
      kind: core_declaration
      field_subsection1: deal_nature_code
      field_subsection2: deal_specifics_code
    sources: [contract]
    source_notes:
      contract: "Контракт/договор — тип сделки (купля-продажа, бартер, безвозмездная и т.д.)."
    default:
      subsection1: "010"
      subsection2: "01"
    flag_if_default: "проверьте характер сделки"
    validation:
      subsection1:
        type: string
        length: 3
        examples: ["010", "020", "030"]
        labels:
          "010": "купля-продажа"
          "020": "бартер"
          "030": "безвозмездная"
      subsection2:
        type: string
