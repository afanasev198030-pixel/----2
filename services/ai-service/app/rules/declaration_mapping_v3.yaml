      subsection3: "не заполняется"

  - graph: 25
    name: "Вид транспорта на границе"
    note: "Код вида транспорта, пересекающего таможенную границу. Определяется по типу транспортного документа."
    target:
      kind: core_declaration
      field: transport_type_border
    sources: [transport_doc]
    source_notes:
      transport_doc: "AWB → 40 (воздух); CMR → 30 (авто); B/L → 10 (море); ж/д накладная → 20."
    ai_rule: |
      Определить код по типу транспортного документа:
      - AWB (Air Waybill) → «40» (воздушный);
      - CMR → «30» (автомобильный);
      - B/L (Bill of Lading) → «10» (морской);
      - ж/д накладная (CIM/СМГС) → «20» (железнодорожный).
    validation:
      type: enum
      values: ["10", "20", "30", "40"]
      labels:
        "10": "морской"
        "20": "железнодорожный"
        "30": "автомобильный"
        "40": "воздушный"
    confidence:
      transport_doc: 0.95

  - graph: 26
    name: "Вид транспорта внутри страны"
    classifier: "Классификатор видов транспорта и транспортировки товаров"
    note: |
      Подраздел 1: код вида ТС, сведения о котором указаны в Графе 18 (ТС при отправлении).
      Подраздел 2: не заполняется.
      Не заполняется: при отсутствии международной перевозки; в РБ.
    target:
      kind: core_declaration
      field: transport_type_inland
    sources: [transport_doc]
    ai_rule: |
      Код вида транспорта — тот же, что использован во внутренней перевозке (графа 18).
      Определить тип из транспортного документа: AWB→40, CMR→30, B/L→10, ж/д→20.
      Не заполняется при отсутствии международной перевозки.
    depends_on: [graph_18]
    validation:
      type: enum
      values: ["10", "20", "30", "40", "50", "80", "90"]
      nullable: true

  - graph: 27
