# Machine-readable mapping rules for Declaration filling (ТЗ v3.0)
# This file is intended as a configuration source for an AI/LLM pipeline:
# - document classification → field extraction → validation → mapping into core-api schema
#
# Notes:
# - "graph" is the DT box number from the ТЗ.
# - "target" is the destination field name (core-api / apply-parsed payload).
# - "sources" are prioritized evidence types (higher first).
# - "validation" is a lightweight, implementation-agnostic contract.
# - Some graphs are not yet present in the current core-api schema; they are marked as "extension".
#
# РОЛЬ ДОКУМЕНТОВ (приоритет источников для товарных позиций):
#   invoice        — ГЛАВНЫЙ источник: список товаров, едущих на таможню, цены
#   packing_list   — ГЛАВНЫЙ источник: веса (гр.35/38), упаковка (гр.31), доп. единицы (гр.41)
#   contract       — источник: валюта (гр.22), условия поставки (гр.20), характер сделки (гр.24)
#   specification  — ТОЛЬКО СВЕРКА: содержит полный список заказа, НЕ используется как источник
#                    позиций, весов и количеств. Передаётся в таможню как вложение (гр.4).

version: "5.0"
document_sources_priority:
  - origin_certificate
  - fcs_classification_decision
  - dts1_customs_value_calc
  - license_or_quota
  - contract
  - contract_addendum
  - invoice
  - packing_list
  - specification
  - transport_doc
  - company_profile
  - heuristic

header_graphs:
  - graph: 1
    name: "Тип декларации / код процедуры"
    target:
      kind: core_declaration
      field: type_code
    sources: [application_statement, contract]
    default: "IM40"
    validation:
      type: string
      examples: ["IM40", "EX10"]
    confidence:
      contract: 0.7
      application_statement: 0.9
      default: 0.3

  - graph: 2
    name: "Отправитель/Экспортер"
    target:
      kind: core_declaration_relation
      field: sender_counterparty_id
      counterparty_type: seller
      extracted_object: seller
    sources: [application_statement, transport_invoice, invoice]
    required_fields: [name, inn, address, country_code]
    optional_fields: [kpp, ogrn]
    source_notes:
      application_statement: |
        Заявка (Application forwarder / Application transport) — поле «Отправитель» / «Forwarding Agent».
        Приоритетный источник: содержит актуальные данные по конкретной отгрузке.
      transport_invoice: "Поле «Shipper» / «Отправитель груза» — резервный источник наименования и адреса."
      invoice: "Поле «Seller» — резервный источник если все остальные не содержат данных."
    ai_rule: |
      Приоритет источников:
      1. Заявка (Application forwarder / Application transport) — поле «Forwarding Agent» / «Отправитель».
      2. Транспортный инвойс — поле «Shipper».
      3. Инвойс на товары — поле «Seller».

      Контракт/договор НЕ является источником для этой графы.

      Извлечь:
      1. Наименование компании (полное).
      2. ИНН или эквивалентный иностранный налоговый номер (VAT, Tax ID — по стране компании).
      3. КПП — если применимо (для иностранных компаний может отсутствовать).
      4. ОГРН или эквивалент (Company Reg. No., Commercial Register No. и т.п.).
      5. Адрес: улица, город, страна.
      6. Код страны (ISO 3166-1 alpha-2).
      При нескольких отправителях — «Различные».
      Страна не RU при импорте — если RU, поднять warning.
    validation:
      type: object
      country_code: { type: iso3166_1_alpha2, not_eq: "RU" }
      note: "обычно не RU при импорте — если RU, поднять warning"
    confidence:
      application_statement: 0.95
      transport_invoice: 0.85
      invoice: 0.75

  - graph: 3
    name: "Формуляры (листы ДТ)"
    note: |
      Подраздел 1 — порядковый номер текущего листа (X).
      Подраздел 2 — общее количество листов ДТ, включая основной и все добавочные (Y).
      Формат: X/Y (например 2/3). На основном листе не заполняется.
      Основной лист: 1 товар. Каждый добавочный лист: до 3 товаров.
    target:
      kind: core_declaration
      field: forms_count
    sources: [invoice]
    note_sources: "Количество товарных позиций берётся ТОЛЬКО из инвойса на товары."
    compute:
      total_sheets: "1 + ceil((total_items - 1) / 3) если total_items > 1, иначе 1"
      sheet_label: "X/Y где X — номер листа (с 2), Y — total_sheets. На основном листе не заполняется."
    validation:
      type: integer
      min: 1
    confidence:
      computed: 0.9

  - graph: 4
    name: "Отгрузочные спецификации"
    note: "Заполняется только если к ДТ приложены отгрузочные спецификации. В остальных случаях — пусто."
    target:
      kind: core_declaration
      field: specifications_count
    sources: [specification]
    compute:
      expression: "count(specification_docs) if specification_docs else null"
    validation:
      type: integer
      min: 1
      nullable: true
    confidence:
      computed: 0.8

  - graph: 5
    name: "Всего товаров (кол-во наименований)"
    note: |
      Количество товарных наименований (позиций), а НЕ штук.
      Источник — инвойс на товары (не транспортный инвойс/фрахтовый).
      В PL считать уникальные наименования, а не количество штук или мест.
      При наличии обоих документов — сверить: при расхождении поднять issue.
    target:
      kind: core_declaration
      field: total_items_count
    sources: [invoice, packing_list]
    source_notes:
      invoice: "ТОЛЬКО инвойс на товары (goods invoice), не транспортный инвойс. Считать строки товарных позиций (line items)."
      packing_list: "Считать уникальные наименования товаров, а не штуки/места."
    compute:
      expression: "len(distinct_item_names)"
    cross_check: "count(invoice.line_items) == count(pl.distinct_names) — при расхождении поднять issue с обеими цифрами"
    validation:
      type: integer
      min: 1
    confidence:
      invoice: 0.95
      packing_list: 0.9
      computed: 0.95

  - graph: 6
    name: "Всего мест"
    target:
      kind: core_declaration
      field: total_packages_count
    sources: [packing_list, transport_doc, acceptance_act]
    validation:
      type: integer
      min: 0
    conflict_check: "если packing_list и transport_doc расходятся — показать обе цифры и поднять flag"
    confidence:
      packing_list: 0.9
      transport_doc: 0.7

  - graph: 7
    name: "Особенности декларирования"
    note: |
      Код особенности декларирования из классификатора особенностей таможенного декларирования товаров.
      Заполняется только если для партии есть применимый код.
      Если особенностей нет или код не предусмотрен классификатором — оставить пустым.
    target:
      kind: core_declaration
      field: special_ref_code
    sources: []
    ai_rule: |
      НЕ заполнять автоматически.
      Оставить пустым и подсветить графу для пользователя с сообщением:
      "Укажите код особенности декларирования из классификатора или оставьте пустым."
      Severity подсветки: info (не error и не warning).
    user_action_required: true
    validation:
      type: string
      max_len: 9
      nullable: true

  - graph: 8
    name: "Получатель"
    target:
      kind: core_declaration_relation
      field: receiver_counterparty_id
      counterparty_type: buyer
      extracted_object: buyer
    sources: [company_profile, contract, invoice]
    source_notes:
      company_profile: "Наивысший приоритет — брать из профиля компании в системе."
      contract: "Раздел «Buyer» / «Покупатель». Предпочитать русскоязычные реквизиты."
      invoice: "Поле «Buyer» / «Покупатель» в инвойсе на товары (не транспортном). Предпочитать русскоязычные реквизиты."
    language_priority: "ru > en — если одни и те же реквизиты присутствуют на русском и английском, использовать русский вариант"
    required_fields: [name, address]
    validation:
      type: object
      inn: { type: digits, length: [10, 12] }
      kpp: { type: digits, length: [9] }
      ogrn: { type: digits, length: [13, 15] }
    confidence:
      company_profile: 0.95
      contract: 0.85
      invoice: 0.8

  - graph: 9
    name: "Лицо, ответственное за финансовое урегулирование"
    target:
      kind: extension
      field: financial_responsible
    sources: [power_of_attorney, broker_agreement]
    source_notes:
      power_of_attorney: "Доверенность на таможенного представителя."
      broker_agreement: "Договор с таможенным представителем (брокером)."
    fallback:
      value: "СМ. ГРАФУ 14 ДТ"
      condition: "если не найдены документы power_of_attorney или broker_agreement"
    ai_rule: |
      Проверить наличие доверенности или договора с брокером среди загруженных документов.
      Если документы есть — извлечь реквизиты лица.
      Если документов нет — заполнить фиксированным текстом "СМ. ГРАФУ 14 ДТ".
    confidence:
      power_of_attorney: 0.9
      broker_agreement: 0.8
      fallback: 1.0

  - graph: 10
    name: "Станция 1-го назначения"
    skip: true
    note: "Графа 10 не заполняется."
    target:
      kind: extension
      field: first_destination_country_code

  - graph: 11
    name: "Торгующая страна"
    note: "Страна местонахождения иностранного контрагента (продавца)."
    target:
      kind: core_declaration
      field: trading_country_code
    sources: [contract, origin_certificate, invoice]
    source_notes:
      contract: "Страна из реквизитов продавца/поставщика."
      origin_certificate: "Страна контрагента в сертификате происхождения."
      invoice: "Страна из реквизитов продавца в инвойсе на товары."
    validation:
      type: iso3166_1_alpha2
    confidence:
      contract: 0.9
      origin_certificate: 0.85
      invoice: 0.8

  - graph: 12
    name: "Общая таможенная стоимость"
    target:
      kind: core_declaration
      field: total_customs_value
    sources: [dts1_customs_value_calc, invoice, contract, transport_invoice]
    compute:
      primary: "sum(items[].customs_value_rub)"
      note: "сумма из граф 45 основного и добавочных листов, округление до 2 знаков после запятой"
      requires: [exchange_rate, graph_23]
    validation:
      type: money_rub
    confidence:
      dts1_customs_value_calc: 0.95
      computed_invoice_fx: 0.6

  - graph: 13
    name: "не заполняется"
    skip: true
    note: "графа 13 не заполняется согласно ТЗ v3.0"

  - graph: 14
    name: "Декларант"
    note: "Краткое наименование, место нахождения, ИНН/КПП, ОГРН лица, подающего ДТ."
    target:
      kind: core_declaration
      field: declarant_inn_kpp
    sources: [power_of_attorney, broker_agreement, company_profile, contract, invoice]
    source_notes:
      power_of_attorney: "Если есть — данные брокера/таможенного представителя."
      broker_agreement: "Если есть — данные брокера/таможенного представителя."
      company_profile: "Если нет доверенности/договора с брокером — данные Получателя из профиля компании."
      contract: "Раздел «Buyer» / «Покупатель». Предпочитать русский язык."
      invoice: "Поле «Buyer» / «Покупатель» в инвойсе на товары. Предпочитать русский язык."
    fallback:
      condition: "если нет power_of_attorney и broker_agreement — использовать данные Получателя (гр. 8)"
    language_priority: "ru > en"
    validation:
      type: object
      required_fields: [short_name, location, inn, kpp, ogrn]
      inn: { type: digits, length: [10, 12] }
      kpp: { type: digits, length: [9] }
      ogrn: { type: digits, length: [13, 15] }
    confidence:
      power_of_attorney: 0.95
      broker_agreement: 0.9
      company_profile: 0.95
      contract: 0.85
      invoice: 0.8

  - graph: 15
    name: "Страна отправления"
    note: |
      Страна, из которой непосредственно прибыл товар.
      Определяется из транспортных документов международной перевозки.
      Может отличаться от страны происхождения (гр. 16).
      Графа 15 — наименование, Графа 15А — ISO-код.
    target:
      kind: core_declaration
      field: country_dispatch_code
    sources: [transport_doc, transport_invoice]
    source_notes:
      transport_doc: "AWB или CMR — поле «Departure» / «From»."
      transport_invoice: "Транспортный инвойс — поле «Departure»."
    validation:
      type: iso3166_1_alpha2
    ai_rule: "Извлечь страну отправления из AWB/CMR (поле Departure/From) или транспортного инвойса (поле Departure). Не путать со страной происхождения товара."
    confidence:
      transport_doc: 0.95
      transport_invoice: 0.85

  - graph: 16
    name: "Страна происхождения"
    note: |
      Страна, где товар произведён или подвергнут достаточной обработке.
      Источники: сертификат происхождения, декларация соответствия (страна изготовителя).
    target:
      kind: core_declaration
      field: country_origin_name
    sources: [origin_certificate, conformity_declaration]
    source_notes:
      origin_certificate: "Сертификат происхождения — основной источник."
      conformity_declaration: "Декларация соответствия — поле «страна изготовителя»."
    filling_rules:
      eu_origin: "Если маркировка/документы указывают на ЕС без конкретной страны → значение «ЕВРОСОЮЗ»."
      mixed_origin: "Если товары из разных стран ИЛИ страна хотя бы одного товара неизвестна → значение «РАЗНЫЕ»."
      all_unknown: "Если страна происхождения всех товаров неизвестна → записать «НЕИЗВЕСТНО» и подсветить пользователю (severity: warning)."
      skip_condition: "Не заполняется при декларировании наличной валюты (банкноты/монеты) при реализации на транспорте."
    validation:
      type: string
      special_values: ["ЕВРОСОЮЗ", "РАЗНЫЕ", "НЕИЗВЕСТНО"]
      or_iso3166_1_alpha2: true
    confidence:
      origin_certificate: 0.95
      conformity_declaration: 0.85

  - graph: 17
    name: "Страна назначения"
    note: |
      Краткое название страны, где товары будут потребляться, использоваться или перерабатываться.
      Если конечная страна неизвестна — указать страну доставки.
      «НЕИЗВЕСТНА» только для: беспошлинной торговли, неполной/периодической ДТ, временной ДТ.
    target:
      kind: core_declaration
      field: country_destination_code
    sources: [transport_doc]
    source_notes:
      transport_doc: "Транспортные документы AWB/CMR — поле «страна прибытия» / destination."
    cross_check: "Гр. 17 обычно совпадает с гр. 10. При расхождении — поднять issue (severity: warning) для проверки пользователем."
    filling_rules:
      general: "Страна назначения из транспортных документов."
      fallback: "Если конечная страна потребления неизвестна — указать страну доставки из транспортных документов."
      unknown_allowed_only_for:
        - "беспошлинная торговля (вывоз)"
        - "неполная или периодическая ДТ"
        - "временная (дополнительная временная) ДТ"
    subfields:
      graph_17: "Краткое наименование страны назначения."
      graph_17a: "Двузначный буквенный код страны из гр. 17 по классификатору стран мира (ISO 3166-1 alpha-2). Заполняется автоматически на основе гр. 17."
    validation:
      type: string
      special_values: ["НЕИЗВЕСТНА"]
      or_iso3166_1_alpha2: true
    confidence:
      transport_doc: 0.95

  - graph: 18
    name: "ТС при отправлении/прибытии"
    target:
      kind: core_declaration
      field: transport_at_border
    sources: [transport_doc]
    validation:
      type: string
      max_len: 512
      subfields:
        subsection_1:
          description: "Кол-во ТС: список идентификаторов через ';' без пробела"
          transport_rules:
            auto: "регистрационные номера (активное ТС / прицепы через '/')"
            rail: "номера вагонов (платформ, цистерн)"
            sea: "наименования судов"
            air: "номера рейсов"
            pipeline_electric: "способ транспортировки (газопровод, нефтепровод, ЛЭП и т.п.)"
        subsection_2:
          description: "ISO-код страны регистрации ТС"
          type: iso3166_1_alpha2
          skip_if: [rail, pipeline, electric]
    skip_condition: "не заполняется при отсутствии международной перевозки и для МПО"

  - graph: 19
    name: "Контейнер"
    note: "Признак перевозки в контейнере. Определяется из транспортных документов."
    target:
      kind: core_declaration
      field: container_info
    sources: [transport_doc]
    source_notes:
      transport_doc: "AWB / CMR / B/L — наличие номера контейнера или пометки «container»."
    ai_rule: |
      Если в транспортном документе есть номер контейнера (формат XXXX 1234567) или
      явное указание на контейнерную перевозку — ставить «1».
      В остальных случаях — «0».
    validation:
      type: enum
      values: ["0", "1"]
      labels:
        "1": "перевозка в контейнере"
        "0": "иные случаи"
    default: "0"
    confidence:
      transport_doc: 0.95

  - graph: 20
    name: "Условия поставки (Incoterms)"
    note: "Код Инкотермс + наименование географического пункта, к которому относится базис. Например: CIF Москва, FOB Shanghai."
    target:
      kind: core_declaration
      field: incoterms_code
    sources: [application_statement, contract]
    source_notes:
      application_statement: "Заявка — приоритетный источник: содержит код Инкотермс и место поставки для данной конкретной отгрузки."
      contract: "Договор поставки — раздел «Delivery Terms» / «Базис поставки». Используется если заявка отсутствует или не содержит условий поставки."
    ai_rule: |
      Извлечь из заявки (приоритет) или договора:
      1) код Инкотермс (3 буквы: EXW, FCA, CPT, CIP, DAP, DPU, DDP, FAS, FOB, CFR, CIF);
      2) наименование географического пункта (город/порт/склад), к которому относится базис.
      Хранить оба значения: код и место.
      Если заявка и договор содержат разные условия — использовать заявку и поднять предупреждение для пользователя.
    validation:
      type: incoterms_2020
      valid_codes: [EXW, FCA, CPT, CIP, DAP, DPU, DDP, FAS, FOB, CFR, CIF]
    confidence:
      application_statement: 0.97
      contract: 0.95

  - graph: 21
    name: "Активное ТС на границе"
    note: |
      Источник: транспортный документ AWB / CMR / B/L (НЕ транспортный инвойс на оплату).
      Шаг 1: определить тип транспортного документа.
      Шаг 2: извлечь идентификатор ТС из документа:
        AWB (авиа) → номер рейса (flight number), например "CA836". НЕ номер AWB.
        CMR (авто) → государственный регистрационный номер грузовика (тягача).
        B/L (море/река) → название судна (vessel name).
        Ж/д накладная → номер поезда.
        Трубопровод/ЛЭП → способ: газопровод/нефтепровод/нефтепродуктопровод/линии электропередачи.
      Подраздел 1: [кол-во ТС]:[id1];[id2] без пробелов.
      Подраздел 2: код страны регистрации ТС (ISO alpha-2).
        Состав ТС — код страны тягача.
        Страна неизвестна → «00».
        Несколько ТС из разных стран → «99».
        Трубопровод/ЛЭП — не заполняется.
    target:
      kind: core_declaration
      field: transport_on_border_id
    sources: [transport_doc]
    source_notes:
      transport_doc: |
        AWB: извлечь vehicle_id = номер рейса (flight_number).
        CMR: извлечь vehicle_id = рег. номер грузовика (тягача).
        B/L: извлечь vehicle_id = название судна (vessel_name).
        НЕ использовать транспортный инвойс (freight invoice) для этой графы.
    ai_rule: |
      Шаг 1: найти транспортный документ (AWB/CMR/B/L), определить его тип.
      Шаг 2: извлечь идентификатор ТС:
        - AWB → номер рейса (flight_number), например "CA836". ВАЖНО: это не номер AWB.
        - CMR → государственный регистрационный номер тягача.
        - B/L → название судна (vessel_name).
        - Ж/д → номер поезда.
        - Трубопровод/ЛЭП: «газопровод», «нефтепровод», «нефтепродуктопровод», «линии электропередачи».
      Шаг 3: сформировать подраздел 1: [кол-во ТС]:[id1];[id2] без пробелов.
      Шаг 4: определить подраздел 2 — код страны регистрации ТС:
        - состав ТС: код страны тягача (приводящего в движение);
        - страна неизвестна → «00»;
        - несколько ТС из разных стран → «99»;
        - трубопровод/ЛЭП: не заполнять.
    confidence:
      transport_doc: 0.9

  - graph: 22
    name: "Валюта и общая фактурная стоимость"
    note: |
      Подраздел 1: код валюты ТОЛЬКО из договора/контракта купли-продажи (ISO 4217).
      Инвойс не является источником для валюты.
      Подраздел 2: сумма значений гр. 42 по всем позициям основного и добавочных листов.
      Для сверки использовать инвойс на товары.
    target:
      kind: core_declaration
      field_currency: currency_code
      field_amount: total_invoice_value
    sources: [contract, invoice]
    source_notes:
      contract: |
        Договор/контракт купли-продажи — ЕДИНСТВЕННЫЙ источник кода валюты (ISO 4217).
        Искать ключевые фразы: «Валютой Контракта являются», «Валюта контракта —»,
        «Contract currency is», «Payment currency:», «расчёты производятся в».
        После фразы следует название валюты — привести к ISO 4217
        (доллары США→USD, евро→EUR, юани/RMB→CNY, рубли→RUB и т.д.).
      invoice: "Инвойс на товары — только для сверки итоговой суммы. НЕ источник валюты. НЕ транспортный инвойс."
    compute:
      amount: "sum(items[].graph_42)"
    cross_check: "sum(items[].graph_42) должна совпадать с итогом инвойса на товары; при расхождении — поднять warning"
    validation:
      currency: { type: iso4217 }
      amount: { type: money, min: 0 }
    confidence:
      contract: 0.97
      invoice: 0.0

  - graph: 23
    name: "Курс валюты (ЦБ РФ)"
    target:
      kind: core_declaration
      field: exchange_rate
    sources: [cbr_official_rate]
    note: "использовать курс на дату принятия ДТ (или ближайший доступный)"
    validation:
