  - graph: 54
    name: "Место и дата"
    target:
      kind: core_declaration
      field: place_and_date
    sources: [company_profile, power_of_attorney]
    compute:
      expression: "city_from_declarant + ', ' + today_dd_mm_yyyy"

item_graphs:
  # ─── КЛЮЧЕВОЕ ПРАВИЛО ДЛЯ ВСЕХ ГРАФ 31–46 ────────────────────────────────
  # Каждая из граф 31–46 заполняется ОТДЕЛЬНО для каждой товарной позиции.
  # Все суммы, веса, количества, цены — ТОЛЬКО по конкретному товару:
  #   • граф 35 (брутто), 38 (нетто) — вес только строк данного товара в PL
  #   • граф 42 (цена) — line_total данной позиции в инвойсе, не итог инвойса
  #   • граф 45 (там. стоимость) — по данному товару; расходы (фрахт, страховка)
  #                                 распределяются пропорционально доле товара
  #   • граф 46 (стат. стоимость) — производная от гр. 45/42 данной позиции
  # Как искать данные по конкретному товару: сопоставлять строки в PL/инвойсе
  # по наименованию, описанию или артикулу, суммировать только совпавшие строки.
  # ─────────────────────────────────────────────────────────────────────────

  - graph: 31
    name: "Грузовые места и описание товаров"
    note: |
      Сведения указываются с новой строки с порядковым номером:
      1. Наименование — из технического описания. Без обобщений «Item 1».
      2. Грузовые места и упаковка — из PL:
         - общее кол-во мест; если частично — доп. в скобках «(X часть места)»;
         - коды видов упаковки по Классификатору через «-» количество упаковок.
         Пример: «3, 21-2, 4G-1».
    target:
      kind: core_item
      field: description
    sources: [technical_docs, packing_list]
    source_notes:
      technical_docs: "Документ «Техническое описание» — наименование товара (пункт 1)."
      packing_list: "PL — общее кол-во грузовых мест и коды видов упаковки (пункт 2)."
    ai_rule: |
      Заполнить в два пункта с новой строки:
      1. Наименование товара — извлечь из технического описания. Не использовать обобщения.
      2. Грузовые места — из PL:
         - кол-во мест, занятых товаром;
         - если неполные места — добавить в скобках (N часть места);
         - коды упаковки по классификатору через «-» количество (напр. 21-2, 4G-1).
    confidence:
      technical_docs: 0.9
      packing_list: 0.9

  - graph: 32
    name: "Порядковый номер товара"
    note: "Порядковый номер позиции в ДТ: 1–999. Основной лист — не более 1 товара, добавочный — до 3."
    target:
      kind: core_item
      field: line_no
    sources: []
    compute:
      expression: "line_no (auto)"
    validation:
      type: integer
      min: 1
      max: 999

  - graph: 33
    name: "ТН ВЭД (10 знаков)"
    target:
      kind: core_item
      field: hs_code
    sources: [fcs_classification_decision, preliminary_classification, tnved_reference, technical_docs]
    validation:
      type: hs10

  - graph: 34
    name: "Страна происхождения товара"
    target:
      kind: core_item
      field: country_origin_code
    sources: [origin_certificate, conformity_declaration, technical_docs]
    source_notes:
      origin_certificate: "Сертификат происхождения — основной источник."
      conformity_declaration: "Декларация о соответствии — поле «страна изготовителя»."
      technical_docs: "Техническое описание — страна производителя."
    validation:
      type: iso3166_1_alpha2
    confidence:
      origin_certificate: 0.95
      conformity_declaration: 0.85
      technical_docs: 0.75

  - graph: 35
    name: "Вес брутто"
    note: |
      Масса брутто (с упаковкой) в кг. Источник — PL. Округление до 3 знаков.
      ТОЛЬКО по данному конкретному товару — суммировать строки PL по этому наименованию.
      Не брать общий вес брутто всей партии/всего PL.
    per_item: true
    target:
      kind: core_item
      field: gross_weight
    sources: [packing_list, transport_doc, weighing_certificate]
    source_notes:
      packing_list: |
        PL — найти все строки данного товара (по наименованию/артикулу),
        суммировать gross_weight по ним. Не брать итоговую строку PL.
      transport_doc: "AWB / CMR / B/L — вес брутто. Использовать если нет PL."
      weighing_certificate: "Сертификат взвешивания. Использовать если нет PL."
    validation:
      type: decimal
      min: 0
      round: 3
    confidence:
      packing_list: 0.95
      transport_doc: 0.8
      weighing_certificate: 0.85

  - graph: 36
    name: "Преференции"
    note: |
      4 элемента (разряда) по Инструкции к Решению КТС № 257:
        1 — тарифная преференция по пошлине (ЗСТ, СНГ, наименее развитые страны и др.)
        2 — льготы по таможенной пошлине
        3 — льготы по акцизу
        4 — льготы по НДС (при ввозе)
      Если льгота не заявляется: «00» (ставка есть, льготы нет).
      Если платёж не возникает вообще: «--».
      Коды из Классификатора льгот/преференций (национальный + ЕАЭС).
    target:
      kind: core_item
      field: preference_code
    sources: [origin_certificate, preference_agreement, preference_decision]
    source_notes:
      origin_certificate: "Сертификат происхождения (СТ-1, Form A, EUR.1) — основание для тарифной преференции (элемент 1)."
      preference_agreement: "Международное соглашение о преференциях (ЗСТ, СНГ и т.п.)."
      preference_decision: "Решение о предоставлении тарифной преференции."
    depends_on: [graph_33]
    ai_rule: |
      Применимые преференции и льготы определяются в соответствии с кодом ТН ВЭД (гр. 33).
      Определить наличие сертификата происхождения и применимых соглашений.
      Заполнить 4 элемента, используя классификатор льгот/преференций.
      Если льгота не заявляется — «00»; если платёж не возникает — «--».
      Подсветить пользователю для проверки (severity: info) — финальные коды требуют подтверждения.
    user_action_required: true
    confidence:
      origin_certificate: 0.8
      preference_agreement: 0.75

  - graph: 37
    name: "Процедура"
    note: |
      Подраздел 1: составной код ААББ.
        АА — код заявляемой процедуры (классификатор видов таможенных процедур).
        ББ — код предшествующей процедуры или «00» если её не было.
        Пример: «4000» (ИМ40, без предшествующей).
      Подраздел 2: 3-значный код особенности перемещения или «000» если нет особенностей.
      Согласован с гр. 1 — при несоответствии подсветить пользователю (warning).
    target:
      kind: core_item
      field: procedure_code
    sources: [contract, application_statement]
    source_notes:
      contract: "Контракт/договор купли-продажи — тип сделки определяет процедуру."
      application_statement: "Заявление/заявка на оформление — код заявляемой процедуры."
    cross_check: "Значение АА должно совпадать с кодом процедуры из гр. 1; при расхождении — warning пользователю."
    depends_on: [graph_1]
    ai_rule: |
      Подраздел 1: взять код процедуры из гр. 1 (АА), добавить код предшествующей процедуры (ББ)
      или «00» если предшествующей не было. Итог: 4 символа (напр. «4000»).
      Подраздел 2: указать код особенности перемещения или «000».
      Если нет уверенности в коде — подсветить пользователю (severity: warning).
    user_action_required: true
    confidence:
      application_statement: 0.85
      derived_from_graph_1: 0.9

  - graph: 38
    name: "Вес нетто"
    note: |
      Масса нетто (без упаковки) в кг. Источник — PL.
      ТОЛЬКО по данному конкретному товару — суммировать все строки PL по этому наименованию.
      Не брать суммарный нетто всего PL и не брать значение одной случайной строки.
    per_item: true
    target:
      kind: core_item
      field: net_weight
    sources: [packing_list]
    source_notes:
      packing_list: |
        PL — найти все строки данного товара (по наименованию/артикулу),
        суммировать net_weight по ним. Не брать итоговую строку PL.
    ai_rule: |
      Найти в PL все строки, относящиеся к данному наименованию товара (match по названию/артикулу).
      Суммировать net_weight ТОЛЬКО по этим строкам — итог и есть значение гр. 38.
      НЕ использовать total/итоговую строку PL — там вес всей партии, а не одного товара.
      Нетто должно быть меньше брутто (гр. 35); если нет — warning.
    cross_check: "net_weight < gross_weight (гр. 35); при нарушении — warning"
    depends_on: [graph_35]
    validation:
      type: decimal
      min: 0
    confidence:
      packing_list: 0.95

  - graph: 39
    name: "Квота"
    target:
      kind: core_item
      field: quota_info
    sources: [license_or_quota]

  - graph: 40
    name: "Предшествующий документ"
    target:
      kind: core_item
      field: prev_doc_ref
    sources: [previous_declaration, temporary_storage_doc]

  - graph: 41
    name: "Дополнительная единица измерения"
    note: "Заполняется только если доп. единица предусмотрена для кода ТН ВЭД (гр. 33)."
    target:
      kind: core_item
      field_unit: additional_unit
      field_qty: additional_unit_qty
    sources: [packing_list]
    source_notes:
      packing_list: "PL — количество товара в доп. единице (штуки, литры, пары и т.д.) по конкретной позиции."
    depends_on: [graph_33]
    ai_rule: |
      Проверить по коду ТН ВЭД (гр. 33), предусмотрена ли дополнительная единица измерения.
      Если предусмотрена — взять количество из Packing List по конкретной позиции.
      Если не предусмотрена — не заполнять.
      Спецификацию для этого поля не использовать.
    confidence:
      packing_list: 0.9
      specification: 0.9

  - graph: 42
    name: "Цена товара"
    note: |
      Фактурная стоимость КОНКРЕТНОГО товара в валюте контракта (гр. 22).
      Источник стоимости — инвойс на товары. Валюта — из договора/контракта.
      Если валюта инвойса ≠ валюте контракта — пересчитать по курсу ЦБ на дату инвойса.
      НЕ брать итоговую сумму инвойса — только строку данного товара.
    per_item: true
    target:
      kind: core_item
      field: unit_price
    sources: [invoice, contract]
    source_notes:
      invoice: |
        Инвойс на товары — найти строку данного товара (по наименованию/артикулу),
        взять line_total или unit_price × quantity именно этой строки.
        НЕ транспортный инвойс. НЕ итоговая строка инвойса (total).
      contract: "Договор/контракт — для определения целевой валюты гр. 22."
    depends_on: [graph_22]
    ai_rule: |
      1. Найти строку данного товара в инвойсе на товары (match по наименованию/артикулу/описанию).
         Взять line_total или unit_price × quantity ТОЛЬКО этой строки.
         НЕ использовать итоговую строку инвойса (grand total / итого).
      2. Определить валюту контракта из гр. 22 (только договор/контракт купли-продажи).
      3. Если валюта инвойса совпадает с валютой контракта — использовать напрямую.
      4. Если валюты различаются — пересчитать по курсу ЦБ на дату инвойса,
         результат подсветить пользователю с предупреждением о конвертации.
    cross_check: "sum(graph_42 по всем позициям) = подраздел 2 гр. 22"
    confidence:
      invoice: 0.95
      contract: 0.97

  - graph: 43
    name: "МОС"
    target:
      kind: core_item
      field: mos_method_code
    sources: [customs_valuation_rules, dts1_customs_value_calc]
    default: "01"
    flag_if_default: "проверьте метод определения стоимости"

  - graph: 44
    name: "Дополнительная информация / Представленные документы"
    classifier: "Классификатор видов документов и сведений"
    note: |
      Перечень документов по каждому товару. Каждый документ указывается с кодом,
      признаком представления, номером и датой.
      Формат: КОД/ПРИЗНАК НОМЕР ОТ ДАТА [ПО ДАТА_ОКОНЧАНИЯ]
      Признаки представления:
        0 — документ НЕ представлен при подаче ДТ
        1 — документ представлен при подаче ДТ
        2 — не представлен (ранее прилагался к другой ДТ) + рег.номер ДТ
        3 — будет представлен после выпуска + обязательство «ОБЯЗУЮСЬ ПРЕДСТАВИТЬ ДО ДД.ММ.ГГГГ»
    target:
      kind: extension
      field: documents_codes
    sources: [all_uploaded_documents]
    source_notes:
      all_uploaded_documents: >
        Все загруженные пользователем файлы: инвойс, транспортные документы, контракт,
        упаковочный лист, сертификаты происхождения, доверенности, лицензии, разрешения и др.
    ai_rule: |
      Для каждого загруженного документа:
      1. Определить тип документа (invoice, transport_doc, contract, packing_list, origin_certificate, и т.д.).
      2. Извлечь номер документа и дату.
      3. Подобрать код по Классификатору видов документов и сведений.
      4. Определить признак представления:
         - «1» — если документ загружен и предоставляется с ДТ
         - «0» — если документ не представлен при подаче
         - «3» — если будет представлен после выпуска (добавить обязательство)
      5. Сформировать строку: КОД/ПРИЗНАК НОМЕР ОТ ДАТА
      Итог — список строк, по одной на каждый документ.

  - graph: 45
    name: "Таможенная стоимость (RUB)"
    note: |
      Не заполняется при декларировании товаров с одним кодом ТН ВЭД разных наименований
      и при декларировании национальной валюты.
      Метод 1 (основной): цена из инвойса на товары (гр. 42) + добавки до границы ЕАЭС,
      переведённые в рубли. ТОЛЬКО по данному конкретному товару.
      Транспортные расходы распределяются пропорционально МАССЕ БРУТТО данного товара.
    per_item: true
    target:
      kind: core_item
      field: customs_value_rub
    sources: [dts1_customs_value_calc, invoice, transport_invoice, insurance_doc, royalty_doc, packaging_doc]
    source_notes:
      dts1_customs_value_calc: "ДТС-1 — если есть, использовать как основной источник (значение по данному товару)."
      invoice: "Инвойс на товары — базовая цена ДАННОГО товара (line_total строки, не итог инвойса)."
      transport_invoice: |
        Транспортный инвойс — если указана общая стоимость за всю партию, распределить по массе брутто:
        freight_item = freight_total × (item_gross_weight / total_gross_weight_all_items)
        Если стоимость указана по каждому товару отдельно — использовать напрямую.
      insurance_doc: "Страховые документы — страховка распределяется пропорционально массе брутто товара (если нет раздельных данных по позициям)."
      royalty_doc: "Документы по роялти/лицензиям — только если загружены и связаны с данным товаром."
      packaging_doc: "Документы по упаковке — только если загружены."
    compute:
      primary: "dts1.item_customs_value"
      method_1: |
        item_price = invoice.line_total            # только строка данного товара (гр. 42)
        weight_share = item_gross_weight / total_gross_weight_all_items
        freight_item = transport_invoice.freight_total * weight_share
        insurance_item = insurance.amount * weight_share  # если загружены документы
        customs_value = (item_price + freight_item + insurance_item
                         + commissions + royalty + packaging) * exchange_rate
      flag_if_method_1: "предварительно — нет ДТС-1"
    depends_on: [graph_23, graph_35, graph_42]
    ai_rule: |
      ВАЖНО: рассчитывать таможенную стоимость ТОЛЬКО для данной позиции, не для всей партии.
      Алгоритм (Метод 1):
      1. Базовая цена = line_total данного товара из инвойса на товары (гр. 42, не grand total).
      2. Прибавить стоимость перевозки до границы ЕАЭС из транспортного инвойса:
         — если транспортный инвойс содержит общую сумму за всю партию:
           weight_share = gross_weight_этого_товара / суммарный_gross_weight_всех_товаров;
           freight_item = total_freight × weight_share;
         — если транспортный инвойс содержит стоимость по данному товару — брать напрямую.
      3. Если загружены страховые документы — прибавить страховку (пропорционально массе брутто).
      4. Если загружены документы по комиссионным/посредникам — прибавить (кроме комиссионера по покупке).
      5. Если загружены документы по упаковке — прибавить стоимость упаковки.
      6. Если загружены документы по роялти/лицензиям — прибавить (только если связаны с данным товаром).
      7. Итог умножить на курс ЦБ (гр. 23). Округлить до 2 знаков.
      8. Пометить «предварительно — нет ДТС-1».
      Указать, какие компоненты учтены, а какие документы отсутствуют.
    validation:
      type: money_rub
      round: 2

  - graph: 46
    name: "Статистическая стоимость (USD)"
    note: |
      Статистическая стоимость в USD по ДАННОЙ товарной подсубпозиции.
      Рассчитывается по конкретному товару, не суммарно по декларации.
      Формат: без пробелов, разделителей и знака валюты, 2 знака после запятой (напр. 12345.67).
    per_item: true
    target:
      kind: core_item
      field: statistical_value_usd
    sources: [graph_45, graph_42, cbr_official_rate]
    source_notes:
      graph_45: "Таможенная стоимость ДАННОГО товара (гр. 45) — основной источник."
      graph_42: "Цена ДАННОГО товара (гр. 42) — если гр. 45 не заполнена."
      cbr_official_rate: "Официальный курс ЦБ USD на дату регистрации ДТ."
    compute:
      primary: "graph_45.customs_value_rub / cbr_usd_rate"
      fallback: "graph_42.price_in_contract_currency / cbr_usd_rate"
      export_adjustment: "привести к базису FOB последний порт убытия или DAP/граница ЕАЭС"
    depends_on: [graph_42, graph_45]
    ai_rule: |
      ВАЖНО: рассчитывать статистическую стоимость ТОЛЬКО для данной позиции, не для всей партии.
      1. Взять таможенную стоимость ДАННОГО товара из гр. 45 (в рублях).
         Если гр. 45 не заполнена — взять цену ДАННОГО товара из гр. 42.
      2. При экспорте: скорректировать на транспортные расходы (доля данного товара)
         до получения базиса FOB/DAP граница.
      3. Разделить на курс ЦБ USD на дату регистрации ДТ.
      4. Округлить до 2 знаков. Записать без пробелов и знака валюты (формат: 12345.67).
    validation:
      type: money_usd
      round: 2

payments_graphs:
  - graph: 47
    name: "Исчисление платежей"
    target:
      kind: derived
      calculator: calc_service
    sources: [hs_code, customs_value_rub, preference_code, vat_rules]

  - graph: 48
    name: "Отсрочка платежей"
    classifier: "Классификатор видов налогов, сборов и иных платежей"
    note: |
      Формат: КОД_ПЛАТЕЖА–ДАТА_ПОСЛЕДНЕГО_ДНЯ_УПЛАТЫ (дд.мм.гггг).
      При рассрочке — даты каждого этапа.
      Не заполняется если отсрочка/рассрочка не предоставлялась.
    target:
      kind: extension
      field: payment_deferral
    sources: [deferral_request, customs_decision, bank_guarantee, pledge]

  - graph: "B"
    name: "Подробности подсчёта"
    classifiers:
      - "Классификатор видов налогов, сборов и иных платежей"
      - "Классификатор валют (ISO 4217)"
      - "Классификатор способов уплаты таможенных и иных платежей"
    note: |
      Суммы уплаченных платежей за все товары ДТ, в разрезе документов подтверждения.
      Формат строки (элементы через «–», без пробелов):
        Элемент 1: код вида платежа (Классификатор)
        Элемент 2: сумма уплаченного платежа
        Элемент 3: цифровой код валюты уплаты (не для РК)
        Элемент 4: номер документа подтверждения (не для РК и РФ)
        Элемент 5: дата уплаты (для РБ) / не указывается для РФ
        Элемент 6: способ уплаты (Классификатор, не для РК и РФ)
        Элемент 7: налоговый номер лица, уплатившего платёж (ИНН для РФ, УНП для РБ)
      Округление: для РФ — до 2 знаков, для РК — до целого.
    target:
      kind: derived
      field: payment_details
    sources: [graph_47, payment_docs]
    ai_rule: |
      Формируется на основе данных графы 47 (исчисленные платежи) и документов подтверждения уплаты.
      Сведения по каждому виду платежа — отдельной строкой.
      Для РФ элементы 4–6 не заполняются, элемент 7 — ИНН лица, уплатившего платёж.
    validation:
      type: string
      format: "код–сумма–валюта–номер–дата–способ–ИНН"

