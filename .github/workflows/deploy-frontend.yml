# Ручной деплой фронта на сервер по SSH (workflow_dispatch).
# Секреты в GitHub: Settings → Secrets and variables → Actions:
#   SSH_PRIVATE_KEY — приватный ключ для входа на сервер
#   SERVER_HOST — хост (напр. 82.148.28.122)
#   SERVER_USER — пользователь SSH (напр. root)
# Опционально: DEPLOY_PATH — каталог на сервере (по умолчанию /home/2/----2)

name: Manual deploy frontend to server

concurrency:
  group: deploy-main
  cancel-in-progress: false

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail

            # Simple lock to avoid concurrent deploys on the server
            (
              flock -n 9 || { echo "Another deploy is running. Exiting."; exit 1; }

              DEPLOY_PATH="${{ secrets.DEPLOY_PATH }}"
              if [ -z "${DEPLOY_PATH}" ]; then DEPLOY_PATH="/home/2/----2"; fi
              cd "${DEPLOY_PATH}"

              echo "==> [1/4] Pulling code..."
              git fetch origin && git reset --hard origin/main

              DC="docker compose -f docker-compose.prod.yml"

              echo "==> [2/4] Building frontend image..."
              ${DC} build frontend

              echo "==> [3/4] Restarting frontend container..."
              ${DC} up -d frontend

              echo "==> [4/4] Done. Open http://82.148.28.122/ and Ctrl+F5"
            ) 9>/tmp/deploy.lock
