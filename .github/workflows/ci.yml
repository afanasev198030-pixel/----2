name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker-build:
    name: Test building Docker images
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Prepare .env for compose validation
        run: cp .env.example .env

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate docker-compose files
        run: |
          set -euo pipefail
          docker compose -f docker-compose.yml config
          docker compose -f docker-compose.prod.yml config

      - name: Build images from docker-compose.prod.yml
        env:
          DOCKER_BUILDKIT: "1"
        run: |
          set -euo pipefail
          docker compose -f docker-compose.prod.yml build core-api ai-service file-service calc-service frontend

      - name: DB migrations and seeds loading checks
        env:
          DOCKER_BUILDKIT: "1"
          COMPOSE_PROJECT_NAME: ci
        run: |
          set -euo pipefail

          DC="docker compose -f docker-compose.prod.yml"
          $DC up -d postgres
          
          POSTGRES_CID="$($DC ps -q postgres)"
          for i in $(seq 1 60); do
            if docker exec "$POSTGRES_CID" pg_isready -U "${POSTGRES_USER:-customs_user}" -d "${POSTGRES_DB:-customs}"; then
              echo "Postgres is ready"
              break
            fi
            sleep 2
          done
          $DC run --rm --no-deps core-api alembic upgrade head
          $DC run --rm --no-deps core-api python -m app.seeds.load
          $DC down -v
