# Деплой бэкенда на сервер по SSH при пуше в main.
# Пересобирает и перезапускает все бэкенд-сервисы: core-api, ai-service, file-service, calc-service.
# Секреты в GitHub: Settings → Secrets and variables → Actions:
#   SSH_PRIVATE_KEY — приватный ключ для входа на сервер
#   SERVER_HOST     — хост (напр. 82.148.28.122)
#   SERVER_USER     — пользователь SSH (напр. root)

name: Deploy backend to server

on:
  push:
    branches: [main]
    paths:
      - 'services/**'
      - 'docker-compose.prod.yml'
      - 'docs/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy backend via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 15m
          script: |
            set -e
            cd /home/2/----2

            echo "==> [1/5] Pulling latest code from main..."
            git fetch origin && git reset --hard origin/main

            echo "==> [2/5] Running DB migrations..."
            docker-compose -f docker-compose.prod.yml exec -T core-api alembic upgrade head

            echo "==> [3/5] Loading graph rules into DB (upsert — safe to run always)..."
            docker-compose -f docker-compose.prod.yml exec -T core-api \
              python -m app.seeds.load_graph_rules || echo "Seed skipped (non-critical)"

            echo "==> [4/5] Rebuilding backend images..."
            docker-compose -f docker-compose.prod.yml build \
              core-api ai-service file-service calc-service --no-cache

            echo "==> [5/5] Restarting backend containers..."
            docker-compose -f docker-compose.prod.yml up -d \
              core-api ai-service file-service calc-service

            echo "==> Done. Backend deployed successfully."
