# Деплой бэкенда на сервер по SSH при пуше в main.
# Пересобирает и перезапускает все бэкенд-сервисы: core-api, ai-service, file-service, calc-service, integration-service.
# Секреты в GitHub: Settings → Secrets and variables → Actions:
#   SSH_PRIVATE_KEY — приватный ключ для входа на сервер
#   SERVER_HOST     — хост (напр. 141.105.65.148)
#   SERVER_USER     — пользователь SSH (напр. root)

name: Deploy backend to server

on:
  push:
    branches: [main]
    paths:
      - 'services/**'
      - 'scripts/**'
      - 'docker-compose.prod.yml'
      - 'docs/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy backend via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 15m
          script: |
            set -e
            cd /home/2/----2

            echo "==> [1/5] Pulling latest code from main..."
            git fetch origin && git reset --hard origin/main

            echo "==> [2/6] Ensuring infrastructure and backend base services are up..."
            docker compose -f docker-compose.prod.yml up -d postgres redis minio chromadb core-api

            echo "==> [3/6] Running DB migrations..."
            docker compose -f docker-compose.prod.yml exec -T core-api alembic upgrade head

            echo "==> [4/6] Loading graph rules into DB (upsert — safe to run always)..."
            docker compose -f docker-compose.prod.yml exec -T core-api \
              python -m app.seeds.load_graph_rules || echo "Seed skipped (non-critical)"

            echo "==> [5/6] Rebuilding backend images..."
            docker compose -f docker-compose.prod.yml build \
              core-api ai-service file-service calc-service integration-service --no-cache

            echo "==> [6/6] Restarting backend containers..."
            docker compose -f docker-compose.prod.yml up -d \
              core-api ai-service file-service calc-service integration-service

            echo "==> [7/8] Waiting for core-api and ai-service health..."
            for i in $(seq 1 30); do
              if curl -sf http://localhost:8001/health >/dev/null && curl -sf http://localhost:8003/health >/dev/null; then
                echo "Health checks passed."
                break
              fi
              if [ "$i" -eq 30 ]; then
                echo "Health checks did not pass in time."
                exit 1
              fi
              sleep 5
            done

            echo "==> [8/8] Running digital broker smoke test..."
            BASE_URL=http://localhost:8001 \
            AI_BASE_URL=http://localhost:8003 \
            INTEGRATION_BASE_URL=http://localhost:8004 \
            python3 scripts/smoke_digital_broker_flow.py --folder "3 dek" --allow-blocking

            echo "==> Done. Backend deployed successfully."
