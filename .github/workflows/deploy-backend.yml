# Ручной деплой бэкенда на сервер по SSH (workflow_dispatch).
# Использует Node.js 24 (2026 compliance).

name: Manual deploy backend to server

concurrency:
  group: deploy-main
  cancel-in-progress: false

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Deploy backend via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 15m
          script: |
            set -euo pipefail

            # Simple lock to avoid concurrent deploys on the server
            (
              flock -n 9 || { echo "Another deploy is running. Exiting."; exit 1; }

              DEPLOY_PATH="${{ secrets.DEPLOY_PATH }}"
              if [ -z "${DEPLOY_PATH}" ]; then DEPLOY_PATH="/home/2/----2"; fi
              cd "${DEPLOY_PATH}"

              echo "==> [1/8] Pulling latest code from main..."
              git fetch origin && git reset --hard origin/main

              DC="docker compose -f docker-compose.prod.yml"

              echo "==> [2/9] Building backend images..."
              ${DC} build core-api ai-service file-service calc-service integration-service --no-cache

              echo "==> [3/9] Ensuring dependencies are up..."
              ${DC} up -d postgres redis minio chromadb gotenberg

              echo "==> [4/9] Waiting for dependencies to be healthy..."
              for i in $(seq 1 40); do
                HEALTHY=true
                for svc in customs-postgres customs-redis customs-minio customs-chromadb; do
                  STATUS=$(docker inspect --format '{{.State.Health.Status}}' "$svc" 2>/dev/null || echo "missing")
                  if [ "$STATUS" != "healthy" ]; then HEALTHY=false; break; fi
                done
                if [ "$HEALTHY" = true ]; then echo "All dependencies healthy."; break; fi
                if [ "$i" -eq 40 ]; then echo "Dependencies not healthy in time."; exit 1; fi
                sleep 5
              done

              echo "==> [5/9] Running DB migrations (from fresh image)..."
              ${DC} run --rm core-api alembic upgrade head

              echo "==> [6/9] Loading graph rules into DB (upsert — safe to run always)..."
              ${DC} run --rm core-api python -m app.seeds.load_graph_rules || echo "Seed skipped (non-critical)"

              echo "==> [7/9] Restarting backend containers..."
              ${DC} up -d --force-recreate core-api ai-service file-service calc-service integration-service

              echo "==> [7.1/9] Starting ai-worker..."
              ${DC} up -d ai-worker

              echo "==> [8/9] Waiting for core-api and ai-service health..."
              for i in $(seq 1 30); do
                if curl -sf http://localhost:8001/health >/dev/null && curl -sf http://localhost:8003/health >/dev/null; then
                  echo "Health checks passed."
                  break
                fi
                if [ "$i" -eq 30 ]; then
                  echo "Health checks did not pass in time."
                  exit 1
                fi
                sleep 5
              done

              echo "==> [8/9] Running digital broker smoke test..."
              BASE_URL=http://localhost:8001 \
              AI_BASE_URL=http://localhost:8003 \
              INTEGRATION_BASE_URL=http://localhost:8004 \
              python3 scripts/smoke_digital_broker_flow.py --folder "3 dek" --allow-blocking

              echo "==> [9/9] Running AI offline eval gate..."
              ${DC} exec -T ai-service \
                python -m app.services.offline_eval \
                --dataset /app/app/ml_models/hs_offline_eval_dataset.jsonl \
                --min-accuracy 0.85 \
                --limit 1000

              echo "==> Done. Backend deployed successfully."
            ) 9>/tmp/deploy.lock
